<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Accounts · Home</title>
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <link rel="icon" href="assets/favicon-base-credit.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="assets/favicon-base-credit.svg" />
  <link rel="stylesheet" href="ui.css" />
  <style>
    .layout { width:min(100% - 2rem, 1100px); }
    .accounts-grid { display:grid; gap:1rem; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); margin-top:1rem; }
    .acc-card { padding:1rem 1rem 1.15rem; position:relative; overflow:hidden; }
    .acc-card h2 { margin:0 0 .35rem; font-size:.85rem; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:var(--color-text-soft); }
    .acc-balance { font-size:1.45rem; font-weight:600; line-height:1.2; font-variant-numeric: tabular-nums; }
    .acc-sub { font-size:.65rem; text-transform:uppercase; letter-spacing:.5px; color:var(--color-text-soft); margin-top:.4rem; }
    .actions { display:flex; flex-wrap:wrap; gap:.6rem; margin:1.25rem 0 .5rem; }
    .btn-accent { background:var(--color-accent); color:#fff; }
    .btn-accent:hover { background:var(--color-accent-hover); }
    .status-bar { font-size:.65rem; display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; }
    .tx-list { list-style:none; margin:0; padding:0; max-height:300px; overflow:auto; }
    .tx-item { padding:.65rem .85rem; border-bottom:1px solid #1f2530; display:flex; justify-content:space-between; gap:.75rem; font-size:.72rem; cursor:pointer; }
    .tx-item:last-child { border-bottom:none; }
    .tx-item:hover { background:var(--color-surface-muted); }
    .tx-item.active { background:color-mix(in srgb, var(--color-accent-soft) 55%, var(--color-surface-strong)); }
    .tx-amt.debit { color:var(--color-danger); }
    .tx-amt.credit { color:var(--color-good); }
    .empty { font-size:.7rem; padding:.75rem 0; }
    .fade-in { animation:fade .35s ease; }
    @keyframes fade { from { opacity:0; transform:translateY(4px);} to { opacity:1; transform:translateY(0);} }
    @media (prefers-reduced-motion: reduce){
      .fade-in { animation: none !important; }
    }
    @media (max-width:650px){
      .accounts-grid { grid-template-columns:1fr 1fr; }
    }
    @media (max-width:520px){
      .accounts-grid { grid-template-columns:1fr; }
      header { flex-direction:column; align-items:flex-start; gap:.6rem; }
      .actions { gap:.5rem; }
      button, .btn { flex:1; justify-content:center; }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1 class="page-title">Accounts Overview</h1>
    <nav class="page-header-nav">
      <button type="button" class="btn btn-outline theme-toggle" data-action="theme-toggle"><span aria-hidden="true">◐</span><span class="theme-toggle-label">Theme</span></button>
  <a href="dashboard.html" class="back-link">← Back to Home</a>
    </nav>
  </header>

  <main class="layout layout-wide">
    <div class="status-bar" id="statusBar">
      <span class="status-pill" id="userNamePill">Loading profile…</span>
      <span class="status-pill" id="lastSyncPill">Sync — …</span>
    </div>

    <div class="actions">
      <button id="refreshBtn" type="button" class="btn-accent">Refresh</button>
      <a id="viewTransfersBtn" class="btn" href="transfer.html">Go To Transfers</a>
      <button id="logoutBtn" type="button">Logout</button>
    </div>

    <section class="accounts-grid" id="accountsGrid">
      <!-- Cards injected -->
    </section>

    <section class="panel fade-in">
      <h3>Recent Transactions</h3>
      <ul class="tx-list" id="txList"></ul>
      <div id="txEmpty" class="empty" style="display:none;">No recent transactions.</div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="common.js"></script>
  <script>
    const state = {
      profile: null,
      transactions: [],
      user: null,
      sse: null,
      _accountsRendered: false
    };

    const grid = document.getElementById('accountsGrid');
    const txList = document.getElementById('txList');
    const txEmpty = document.getElementById('txEmpty');
    const userNamePill = document.getElementById('userNamePill');
    const lastSyncPill = document.getElementById('lastSyncPill');
    const refreshBtn = document.getElementById('refreshBtn');
    const viewTransfersBtn = document.getElementById('viewTransfersBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    function fmtAmt(v){
      const amount = typeof v === 'number' ? v : Number(v);
      return Number.isFinite(amount)
        ? amount.toLocaleString(undefined,{style:'currency',currency:'USD'})
        : '—';
    }
    function nowStamp(){ return new Date().toLocaleTimeString(); }
    const SSE_RECONNECT_MS = 5000;

    function normalizeTransactions(payload){
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload?.transactions)) return payload.transactions;
      if (Array.isArray(payload?.data)) return payload.data;
      return [];
    }

    function getTransactionsCacheKey(){
      const currentUserId = window.resolveUserId?.(state.user?.id || state.user?.sub) || (state.user?.id || state.user?.sub || 'guest');
      return `bs-recent-transactions:${currentUserId}`;
    }

    function readCachedTransactions(){
      try {
        return sortRecentTransactions(JSON.parse(localStorage.getItem(getTransactionsCacheKey()) || '[]'));
      } catch {
        return [];
      }
    }

    function writeCachedTransactions(rows){
      try {
        localStorage.setItem(getTransactionsCacheKey(), JSON.stringify(sortRecentTransactions(rows)));
      } catch {}
    }

    function sortRecentTransactions(rows){
      return normalizeTransactions(rows)
        .filter(Boolean)
        .sort((a, b) => new Date(b?.created_at || 0).getTime() - new Date(a?.created_at || 0).getTime());
    }

    function apiUrl(path=''){
      const normalizedPath = `/${String(path || '').replace(/^\/+/, '')}`;
      if (/^\/api(\/|$)/i.test(normalizedPath)) return normalizedPath;
      return `${window.API_BASE}${normalizedPath}`;
    }

    function handleAuthRequired(message){
      const outcome = window.BSSession?.onAuthRequired
        ? window.BSSession.onAuthRequired({ message })
        : { redirected: true };
      if (!outcome.redirected) {
        userNamePill.textContent = outcome.message || message;
        lastSyncPill.textContent = 'Auth required';
      }
      return outcome;
    }

    function loadStoredUser(){
      if (window.BSSession?.getUser) {
        state.user = window.BSSession.getUser();
      } else {
        try {
          state.user = JSON.parse(localStorage.getItem('bs-user')||'null');
        } catch { state.user = null; }
      }
      const fallbackToken = window.BSSession?.getToken ? window.BSSession.getToken() || '' : (localStorage.getItem('bs-token') || '');
      if (state.user && !state.user.token && fallbackToken) {
        state.user.token = fallbackToken;
        try { localStorage.setItem('bs-user', JSON.stringify(state.user)); } catch {}
      }
      if (!state.user && fallbackToken) {
        state.user = { token: fallbackToken };
      }
      if((!state.user || !state.user.token) && !fallbackToken){
        handleAuthRequired('Session expired. Please log in.');
        return false;
      }
      return true;
    }

    function authHeaders(){
      let headers = {};
      if (window.getAuthHeaders) {
        headers = window.getAuthHeaders();
      } else {
        try {
          const storedUser = JSON.parse(localStorage.getItem('bs-user') || 'null');
          const token = storedUser?.token || localStorage.getItem('bs-token') || '';
          headers = token ? { Authorization: `Bearer ${token}` } : {};
        } catch {
          const token = localStorage.getItem('bs-token') || '';
          headers = token ? { Authorization: `Bearer ${token}` } : {};
        }
      }
      return {
        'Content-Type':'application/json',
        ...headers
      };
    }

    async function fetchJSON(url, opts={}){
      const isAbsolute = /^https?:\/\//i.test(String(url || ''));
      const target = isAbsolute ? url : apiUrl(url);
      const res = await fetch(target, opts);
      if (res.status === 401) {
        handleAuthRequired('Session expired. Please log in.');
      }
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { data = null; }
      if(!res.ok) throw new Error(data?.error || ('HTTP ' + res.status));
      return data;
    }

    function renderAccounts(){
      if(!state.profile) return;
      const availableBalance = Number(state.profile.available_balance ?? state.profile.balances?.available ?? state.profile.balances?.total ?? 0);
      const defs = [
        { key:'available_balance', label:'Available Balance', value:availableBalance }
      ];

      const existing = grid.querySelectorAll('.acc-card');
      const needBuild = existing.length !== defs.length || !state._accountsRendered;
      if(needBuild){
        grid.innerHTML = '';
        defs.forEach(acc => {
          const div = document.createElement('div');
          div.className = 'acc-card' + (state._accountsRendered ? '' : ' fade-in');
          div.dataset.key = acc.key;
          div.innerHTML = `
            <h2>${acc.label}</h2>
            <div class="acc-balance" data-role="balance">${fmtAmt(acc.value)}</div>
            <div class="acc-sub" data-role="sub">Updated ${nowStamp()}</div>
          `;
          grid.appendChild(div);
        });
        state._accountsRendered = true;
        return;
      }

      // Update in place without rebuilding to avoid flicker
      defs.forEach(acc => {
        const card = grid.querySelector(`.acc-card[data-key="${acc.key}"]`);
        if(card){
          const balEl = card.querySelector('[data-role="balance"]');
          const subEl = card.querySelector('[data-role="sub"]');
          if(balEl) balEl.textContent = fmtAmt(acc.value);
          if(subEl) subEl.textContent = 'Updated ' + nowStamp();
        }
      });
    }

    function renderTransactions(){
      txList.innerHTML = '';
      const recentTransactions = sortRecentTransactions(state.transactions);

      if(!recentTransactions.length){
        txList.style.display = 'none';
        txEmpty.style.display = 'block';
        txEmpty.textContent = 'No recent transactions yet.';
        return;
      }
      txList.style.display = 'block';
      txEmpty.style.display = 'none';
      recentTransactions.forEach(tx=>{
        const li = document.createElement('li');
        li.className = 'tx-item';
        const txType = String(tx.type || tx.direction || tx.status || '').toLowerCase();
        const amount = Number(tx.amount ?? 0);
        const isDebit = txType === 'debit' || amount < 0;
        const amtCls = isDebit ? 'debit' : 'credit';
        const ref = tx.reference || tx.id || '';
        const createdAt = tx.created_at
          ? new Date(tx.created_at).toLocaleString()
          : 'Just now';
        li.innerHTML = `
          <span>
            <strong>${tx.description || txType || 'transaction'}</strong><br>
            <small>${createdAt}${ref ? ` • ${ref}` : ''}</small>
          </span>
          <span class="tx-amt ${amtCls}">${fmtAmt(Math.abs(amount))}</span>
        `;
        li.addEventListener('click', ()=>{
          // Store selection for transactions page receipt
            localStorage.setItem('last-transfer', JSON.stringify({
              id: tx.id,
              amount: tx.amount,
              type: tx.type,
              description: tx.description,
              reference: tx.reference,
              sender_email: tx.sender_email,
              recipient_email: tx.recipient_email,
              sender_fullname: tx.sender_fullname,
              recipient_fullname: tx.recipient_fullname,
              status: tx.status || 'completed',
              created_at: tx.created_at
            }));
            location.href = 'transactions.html';
        });
        txList.appendChild(li);
      });
    }

    function balancesChanged(a,b){
      const keys = ['available_balance'];
      return keys.some(k => Number(a?.[k] ?? 0) !== Number(b?.[k] ?? 0));
    }

    function applyProfile(p){
      const had = state.profile;
      state.profile = p;
      userNamePill.textContent = p.fullname || '—';
      lastSyncPill.textContent = 'Sync — ' + nowStamp();
      // Mirror into localStorage bs-user for cross tabs
      try {
        const stored = JSON.parse(localStorage.getItem('bs-user')||'{}');
        stored.fullname = p.fullname;
        stored.available_balance = Number(p.available_balance ?? p.balances?.available ?? p.balances?.total ?? 0);
        localStorage.setItem('bs-user', JSON.stringify(stored));
      } catch {}
      if(!had || balancesChanged(had, p)){
        renderAccounts();
      }
    }

    function debounce(fn, wait){
      let t; return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), wait); };
    }

    function setRefreshState(isLoading){
      if(!refreshBtn) return;
      refreshBtn.disabled = !!isLoading;
      refreshBtn.textContent = isLoading ? 'Refreshing…' : 'Refresh';
    }

    async function loadProfile(){
      try {
        userNamePill.textContent = 'Loading profile…';
        const currentUserId = window.resolveUserId?.(state.user?.id || state.user?.sub) || (state.user?.id || state.user?.sub || "");
        const data = await fetchJSON(apiUrl(`/users/me?userId=${encodeURIComponent(currentUserId)}`), { headers: authHeaders() });
        applyProfile(data);
      } catch(e){
        console.warn('Profile load failed', e);
        userNamePill.textContent = 'Profile unavailable';
      }
    }

    async function loadTransactions(){
      try {
        const currentUserId = window.resolveUserId?.(state.user?.id || state.user?.sub) || (state.user?.id || state.user?.sub || "");
        const data = await fetchJSON(apiUrl(`/transactions?userId=${encodeURIComponent(currentUserId)}`), { headers: authHeaders() });
        state.transactions = sortRecentTransactions(data);
        writeCachedTransactions(state.transactions);
        renderTransactions();
      } catch(e){
        console.warn('Transactions load failed', e);
        state.transactions = readCachedTransactions();
        renderTransactions();
        if (!state.transactions.length) {
          txList.style.display = 'none';
          txEmpty.style.display = 'block';
          txEmpty.textContent = e?.message || 'Could not load recent transactions.';
        }
      }
    }

    const scheduleApplyProfile = debounce((p)=>applyProfile(p), 1200);

    function updateDashboard(data){
      const merged = { ...(state.profile || {}), ...(data || {}) };
      scheduleApplyProfile(merged);
      loadTransactions();
    }

    function startUserStream(currentUser){
      if(!currentUser?.id || !currentUser?.token) return;

      if(state.sse){
        state.sse.close();
        state.sse = null;
      }

      const resolvedUserId = window.resolveUserId?.(currentUser.id || currentUser.sub) || (currentUser.id || currentUser.sub || "");
      const streamURL = `${window.API_BASE}/stream/user/${encodeURIComponent(resolvedUserId)}?token=${encodeURIComponent(currentUser.token)}`;
      const stream = new EventSource(streamURL);
      state.sse = stream;

      stream.onmessage = (event)=>{
        try {
          const data = JSON.parse(event.data);
          if (data?.connected) return;
          updateDashboard(data);
        } catch {}
      };

      stream.onerror = ()=>{
        console.warn('Stream lost. Reconnecting...');
        stream.close();
        if (state.user?.id && state.user?.token) {
          setTimeout(()=> startUserStream(state.user), SSE_RECONNECT_MS);
        }
      };
    }

    function wireActionButtons(){
      if (refreshBtn && refreshBtn.dataset.bound !== '1') {
        refreshBtn.dataset.bound = '1';
        refreshBtn.addEventListener('click', ()=>{
          lastSyncPill.textContent = 'Sync — Refreshing…';
          setRefreshState(true);
          window.location.reload();
        });
      }

      if (viewTransfersBtn && viewTransfersBtn.dataset.bound !== '1') {
        viewTransfersBtn.dataset.bound = '1';
        viewTransfersBtn.addEventListener('click', (event)=>{
          event.preventDefault();
          window.location.assign('transfer.html');
        });
      }

      if (logoutBtn && logoutBtn.dataset.bound !== '1') {
        logoutBtn.dataset.bound = '1';
        logoutBtn.addEventListener('click', ()=>{
          if (window.BSSession?.clearSession) window.BSSession.clearSession();
          else {
            localStorage.removeItem('bs-user');
            localStorage.removeItem('bs-token');
          }
          if (window.BSSession?.goToLogin) window.BSSession.goToLogin();
          else location.href='login.html';
        });
      }
    }

    // Cross-tab sync
    window.addEventListener('storage', (e)=>{
      if(e.key === 'bs-user' && e.newValue){
        try {
          const u = JSON.parse(e.newValue);
          if (Number(u?.available_balance ?? 0) !== Number(state.profile?.available_balance ?? state.profile?.balances?.available ?? state.profile?.balances?.total ?? 0)) loadProfile();
        } catch {}
      }
    });

    async function init(){
      if (window.Notifications) window.Notifications.init();

      state.transactions = readCachedTransactions();
      renderTransactions();

      if (!loadStoredUser()) {
        return;
      }

      wireActionButtons();

      await Promise.all([
        loadProfile(),
        loadTransactions()
      ]);

      startUserStream(state.user);
      setInterval(loadTransactions, 60000); // Light polling for tx list
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
