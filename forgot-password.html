<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover">
  <title>Forgot Password  Base Credit</title>
    <link rel="icon" href="assets/favicon-base-credit.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="assets/favicon-base-credit.svg" />
  <link rel="stylesheet" href="ui.css">
  <style>
    .forgot-form { display:flex; flex-direction:column; gap:.85rem; }
    .msg { margin-top:.2rem; font-size:.9rem; color:var(--color-text-muted); min-height:1.25rem; }
    .back-row { margin-top:.25rem; text-align:center; font-size:.85rem; color:var(--color-text-soft); }
  </style>
</head>
<body>
  <div class="hero-background"></div>
  <div class="particles"></div>
  <div class="auth-wrapper">
    <a href="login.html" class="btn-shared btn-outline safe-fixed-top-left" aria-label="Go back to login">← Back to login</a>
    <section class="auth-card">
      <div class="auth-head">
        <img class="auth-logo" src="assets/logo-base-credit.svg" alt="Base Credit" />
        <h1 class="auth-title">Forgot your password?</h1>
        <p class="auth-sub">Enter your account email and we&apos;ll send a reset link.</p>
      </div>

      <form id="forgotForm" class="forgot-form">
        <div class="field">
          <label for="email">Email</label>
          <input class="input-base" id="email" type="email" required placeholder="you@example.com">
        </div>
        <button class="btn-full" type="submit">Send reset link</button>
      </form>

      <div id="status" class="msg"></div>
      <div class="back-row"><a href="login.html">Return to sign in</a></div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="common.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const s = document.getElementById('status'); s.textContent = '';
      try{
        const res = await fetch('/api/password/forgot', { method:'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email }) });
        if(!res.ok) throw new Error('Request failed');
        s.textContent = 'If that email exists, a reset link has been sent.';
      } catch (err){ s.textContent = 'Failed to request reset. Try again later.'; }
    });
  </script>
</body>
</html>
