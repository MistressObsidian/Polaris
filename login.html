<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login • Base Credit</title>
  <link rel="stylesheet" href="ui.css" />
  <script src="config.js"></script>
  <link rel="icon" href="base.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="hero-background"></div>
  <div class="particles" id="particles"></div>

  <main class="auth-wrapper">
    <a href="index.html" class="btn-shared btn-outline safe-fixed-top-left" aria-label="Go to home">← Go Back</a>

    <section class="auth-card" aria-labelledby="loginTitle">
      <div class="auth-head">
        <div class="auth-logo" aria-hidden="true">
          <!-- Logo SVG omitted for brevity -->
        </div>
        <h1 class="auth-title" id="loginTitle">Welcome Back</h1>
        <p class="auth-sub">Sign in to your Base Credit account</p>
      </div>

      <div id="loginAlert" class="alert-auth" role="alert"></div>

      <form id="loginForm" class="form-grid" method="post" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input class="input-base" id="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="field" id="pwFieldLogin">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input class="input-base" id="password" type="password" placeholder="Your password" required />
            <button type="button" class="pw-toggle" id="pwToggleLogin" aria-label="Show password">Show</button>
          </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; gap:.75rem; flex-wrap:wrap; font-size:.7rem;">
          <label style="display:flex; align-items:center; gap:.45rem; cursor:pointer; color:rgba(255,255,255,.7);">
            <input type="checkbox" id="remember" style="accent-color:#667eea; width:16px; height:16px;"> Remember me
          </label>
          <a href="forgot-password.html" style="color:#667eea; text-decoration:none; font-weight:600;">Forgot password?</a>
        </div>

        <button type="submit" class="btn-full" id="loginBtn">Sign In</button>
      </form>

      <div class="auth-alt">Don't have an account? <a href="register.html">Sign up</a></div>
    </section>
  </main>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const ADMIN_TOKEN_KEY = "bs-admin-token";
  const ADMIN_META_KEY = "bs-admin-meta";
  const form = document.getElementById('loginForm');
  const pwField = document.getElementById('password');
  const alertBox = document.getElementById('loginAlert');
  const pwToggleLogin = document.getElementById('pwToggleLogin');
  const loginBtn = document.getElementById('loginBtn');

  try {
    const existingAdminToken = localStorage.getItem(ADMIN_TOKEN_KEY) || '';
    if (existingAdminToken) {
      window.location.href = 'admin.html';
      return;
    }
  } catch {}

  if (pwToggleLogin) {
    pwToggleLogin.addEventListener('click', () => {
      const isHidden = pwField.type === 'password';
      pwField.type = isHidden ? 'text' : 'password';
      pwToggleLogin.textContent = isHidden ? 'Hide' : 'Show';
    });
  }

  function showError(msg){
    alertBox.textContent = msg;
    alertBox.classList.add('show');
    setTimeout(()=>alertBox.classList.remove('show'),1500);
  }

  function setBusy(isBusy, label){
    loginBtn.disabled = isBusy;
    loginBtn.textContent = label || 'Sign In';
  }

  async function loginRequest(url, payload){
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    let data = {};
    try { data = text ? JSON.parse(text) : {}; } catch {}

    if (!res.ok) throw new Error(data?.error || `Login failed (${res.status})`);
    return data;
  }

  async function signIn() {
    alertBox.textContent = '';

    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = pwField.value;

    if (!email || !password) return showError('Email and password required');

    setBusy(true, 'Signing in...');

    try {
      try {
        const data = await loginRequest('/api/login', { email, password });

        const user = {
          id: data.id,
          fullname: data.fullname,
          email: data.email,
          accountname: data.accountname,
          available_balance: data.available_balance ?? data.balances?.available ?? data.balances?.total ?? 0,
          token: data.token,
          isAuthenticated: true,
          ts: Date.now()
        };
        localStorage.setItem('bs-user', JSON.stringify(user));
        localStorage.setItem('bs-token', user.token);
        localStorage.removeItem(ADMIN_TOKEN_KEY);
        localStorage.removeItem(ADMIN_META_KEY);

        loginBtn.textContent = 'Success!';
        window.location.href = 'dashboard.html';
        return;
      } catch (userErr) {
        const data = await loginRequest('/api/admin/login', { email, password });
        localStorage.setItem(ADMIN_TOKEN_KEY, data.token || '');
        localStorage.setItem(ADMIN_META_KEY, JSON.stringify(data.admin || { email, role: 'admin' }));
        localStorage.removeItem('bs-user');
        localStorage.removeItem('bs-token');
        loginBtn.textContent = 'Success!';
        window.location.href = 'admin.html';
        return;
      }
    } catch (err) {
      console.error('Login error:', err);
      showError(err.message || 'Login failed');
      setBusy(false, 'Sign In');
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    await signIn();
  });
});
</script>
</body>
</html>
