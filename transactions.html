<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transactions · Base Credit</title>
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="ui.css" />
  <link rel="icon" href="assets/favicon-base-credit.svg" type="image/svg+xml" />
  <style>
    .layout { display:grid; gap:1rem; grid-template-columns: 1.05fr .95fr; }

    /* Left list */
    .tx-list { max-height:520px; overflow:auto; }
    .tx-item { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px; cursor:pointer; }
    .tx-item:hover { background:var(--color-surface-muted); }
    .tx-item.active { background:color-mix(in srgb, var(--color-accent-soft) 60%, var(--color-surface-strong)); box-shadow: inset 3px 0 0 var(--color-accent); }
    .tx-left { display:flex; align-items:center; gap:10px; }
    .tx-icon { width:36px; height:36px; display:grid; place-items:center; border-radius:50%; background:var(--color-accent-soft); color:color-mix(in srgb, var(--color-accent) 72%, white 12%); font-weight:900; }
    .tx-title { font-weight:800; }
    .tx-meta { font-size:.8rem; color:var(--color-text-muted); }
    .tx-amount { font-weight:900; }
    .tx-amount.pos { color:var(--color-good); }
    .tx-amount.neg { color:var(--color-danger); }

    /* Right receipt */
    .status-row { display:flex; align-items:center; justify-content:space-between; gap:.75rem; margin-bottom:.6rem; flex-wrap:wrap; }
    .status-pill { display:inline-block; padding:.4rem .65rem; border-radius:999px; font-weight:700; font-size:.72rem; }
    .status-pill.completed { color:#0f5132; background:#d1fae5; border:1px solid #a7f3d0; }
    .status-pill.pending { color:#7a4a0c; background:#fef3c7; border:1px solid #fde68a; }

    .banner { display:flex; align-items:center; gap:.6rem; padding:.75rem .85rem; border-radius:12px; font-weight:700; margin:.35rem 0 .85rem; }
    .banner.ok { color:var(--color-good); background:var(--color-good-soft); border:1px solid color-mix(in srgb, var(--color-good) 30%, transparent); }
    .banner.warn { color:var(--color-warn); background:var(--color-warn-soft); border:1px solid color-mix(in srgb, var(--color-warn) 30%, transparent); }
    .banner .icon { width:26px; height:26px; border-radius:50%; display:grid; place-items:center; color:var(--color-good); background:color-mix(in srgb, var(--color-good-soft) 80%, transparent); }
    .banner.warn .icon { color:var(--color-warn); background:color-mix(in srgb, var(--color-warn-soft) 82%, transparent); }

    .amount-line { display:flex; align-items:baseline; gap:10px; margin:.6rem 0 1rem; flex-wrap:wrap; }
    .amount-line .label { color:var(--color-text-muted); font-size:.8rem; }
    .amount-line .value { font-size:1.55rem; font-weight:900; }

    .details-grid { display:grid; gap:.75rem; grid-template-columns:1fr; }
    @media (min-width:760px){ .details-grid { grid-template-columns:1fr 1fr; } }
    .detail { padding:.85rem; border:1px solid var(--color-border); border-radius:12px; background:var(--color-surface-strong); }
    .detail .label { color:var(--color-text-muted); font-size:.7rem; margin-bottom:6px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; }
    .detail .value { font-weight:800; }

    .note { margin-top:18px; font-size:.8rem; color:var(--color-text-soft); }
    .extra-detail { margin-top:.6rem; font-size:.85rem; color:var(--color-text-muted); }
    .extra-detail strong { font-weight:700; color:var(--color-text); }

    @media (max-width:900px){ main.layout { grid-template-columns: 1fr; } }
    @media (max-width:520px){
      .btn { flex:1; justify-content:center; }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1 class="page-title">Transactions</h1>
    <nav class="page-header-nav"><button type="button" class="btn btn-outline theme-toggle" data-action="theme-toggle"><span aria-hidden="true">◐</span><span class="theme-toggle-label">Theme</span></button><a class="back-link" href="dashboard.html">← Back to Home</a></nav>
  </header>

  <main class="layout layout-wide layout-split-equal">
    <!-- Left: All transactions -->
    <section class="panel">
      <h2>All Transactions</h2>
      <div id="txList" class="tx-list" aria-label="All transactions"></div>
    </section>

    <!-- Right: Receipt -->
    <section class="panel">
      <h2>Receipt</h2>
      <div class="status-row">
        <span id="summaryText" class="pill">Loading…</span>
        <span id="statusPill" class="status-pill"></span>
      </div>
      <div id="statusBanner" class="banner" style="display:none;"></div>

      <div class="amount-line">
        <span class="label">Amount</span>
        <span class="value" id="amountValue">$0.00</span>
      </div>

      <div class="details-grid">
        <div class="detail">
          <div class="label">From</div>
          <div class="value" id="fromValue">—</div>
        </div>
        <div class="detail">
          <div class="label">To</div>
          <div class="value" id="toValue">—</div>
        </div>
        <div class="detail">
          <div class="label">Description</div>
          <div class="value" id="descriptionValue">—</div>
        </div>
        <div class="detail">
          <div class="label">Reference</div>
          <div class="value" id="referenceValue">—</div>
        </div>
        <div class="detail">
          <div class="label">Network</div>
          <div class="value" id="networkValue">Base Transfer</div>
        </div>
        <div class="detail">
          <div class="label">Fees</div>
          <div class="value" id="feesValue">No fee</div>
        </div>
      </div>

      <div id="extraDetails" class="extra-detail"></div>

      <div class="actions"></div>
      <div class="note" id="txContainer"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="common.js"></script>
  <script>
    function getSessionUser() {
      if (window.BSSession?.getUser) return window.BSSession.getUser();
      let user = null;
      let fallbackToken = "";
      try { user = JSON.parse(localStorage.getItem("bs-user") || "null"); } catch { user = null; }
      try { fallbackToken = localStorage.getItem("bs-token") || ""; } catch { fallbackToken = ""; }

      const token = user?.token || fallbackToken;
      if (!token) return null;

      if (user && !user.token) {
        user.token = token;
        try { localStorage.setItem("bs-user", JSON.stringify(user)); } catch {}
      }

      return user || { token };
    }

    function showAuthMessage(message) {
      const note = document.getElementById("txContainer");
      if (note) note.textContent = message;
      const list = document.getElementById("txList");
      if (list) list.innerHTML = `<div style="padding:12px; color:var(--muted)">${message}</div>`;
      const summary = document.getElementById("summaryText");
      if (summary) summary.textContent = "Session required";
    }

    function handleAuthRequired(message) {
      const outcome = window.BSSession?.onAuthRequired
        ? window.BSSession.onAuthRequired({ message })
        : { redirected: true };
      if (!outcome.redirected) showAuthMessage(outcome.message || message);
    }

    document.addEventListener("DOMContentLoaded", async () => {
      if (window.Notifications) window.Notifications.init();
      try {
        const user = getSessionUser();
        if (!user?.token) { handleAuthRequired("Session expired. Please log in."); return; }
        await loadSettings();
        loadAllTransactions();
      } catch (err) {
        console.error("Transactions init error:", err);
        document.getElementById("txContainer").textContent = "Could not load transactions.";
      }
    });

    const nameCache = new Map();
    let allTxs = [];

    function apiUrl(path = '') {
      const normalizedPath = `/${String(path || '').replace(/^\/+/, '')}`;
      if (/^\/api(\/|$)/i.test(normalizedPath)) return normalizedPath;
      return `${window.API_BASE}${normalizedPath}`;
    }

    function authHeaders(){
      if (window.getAuthHeaders) return window.getAuthHeaders();
      try {
        const storedUser = JSON.parse(localStorage.getItem('bs-user') || 'null');
        const token = storedUser?.token || localStorage.getItem('bs-token') || '';
        return token ? { Authorization: `Bearer ${token}` } : {};
      } catch {
        const token = localStorage.getItem('bs-token') || '';
        return token ? { Authorization: `Bearer ${token}` } : {};
      }
    }

    async function loadSettings(){
      return;
    }

    async function lookupName(email, token){
      try{
        const key = (email||'').toLowerCase();
        if (!key) return null;
        if (nameCache.has(key)) return nameCache.get(key);
        nameCache.set(key, null);
        return null;
      } catch { return null; }
    }

    async function loadAllTransactions(){
      try{
        const user = getSessionUser();
        if (!user?.token) {
          handleAuthRequired("Session expired. Please log in.");
          return;
        }
        const currentUserId = window.resolveUserId?.(user?.id || user?.sub) || (user?.id || user?.sub || "");
        const res = await fetch(apiUrl(`/transactions?userId=${encodeURIComponent(currentUserId)}`), {
          headers: authHeaders()
        });
        const text = await res.text();
        const txRows = text ? JSON.parse(text) : [];
        if (res.status === 401) {
          handleAuthRequired(txRows?.error || "Session expired. Please log in.");
          return;
        }
        if (!res.ok) throw new Error(txRows?.error || `Failed to load transactions (${res.status})`);
        allTxs = Array.isArray(txRows) ? txRows : [];
        renderTxList(allTxs);

        // Preselect from localStorage or first
        let preselect = null;
        try { preselect = JSON.parse(localStorage.getItem('transfer') || 'null'); } catch {}
        if (!preselect) { try { preselect = JSON.parse(localStorage.getItem('last-transfer') || 'null'); } catch {} }
        let initial = preselect && preselect.id ? (allTxs.find(t => t.id === preselect.id) || preselect) : allTxs[0];
        if (initial) renderReceipt(initial);
        if (!allTxs.length) document.getElementById("txContainer").textContent = "No transactions found.";
      } catch(err){
        console.error('Load all transactions error:', err);
        document.getElementById("txContainer").textContent = err.message || 'Failed to load transactions';
      }
    }

    function renderTxList(list){
      const container = document.getElementById('txList');
      if (!container) return;
      container.innerHTML = '';
      if (!list || !list.length){
        container.innerHTML = `<div style="padding:12px; color:var(--muted)">No transactions</div>`;
        return;
      }
      list.forEach((tx, idx) => {
        const item = document.createElement('div');
        item.className = 'tx-item';
        const isCredit = (tx.type || '').toLowerCase() === 'credit';
        const amount = Number(tx.amount || 0);
        const prefix = isCredit ? '+' : '-';
        const signClass = isCredit ? 'pos' : 'neg';
        const when = tx.created_at ? new Date(tx.created_at).toLocaleString() : '';
        const title = tx.description || (isCredit ? 'Credit' : 'Debit');
        item.innerHTML = `
          <div class="tx-left">
            <div class="tx-icon">${isCredit ? '💰' : '💸'}</div>
            <div>
              <div class="tx-title">${title}</div>
              <div class="tx-meta">${when}</div>
            </div>
          </div>
          <div class="tx-amount ${signClass}">${prefix}$${amount.toFixed(2)}</div>
        `;
        item.addEventListener('click', () => {
          Array.from(container.children).forEach(c => c.classList.remove('active'));
          item.classList.add('active');
          renderReceipt(tx);
        });
        if (idx === 0) item.classList.add('active');
        container.appendChild(item);
      });
    }

    async function renderReceipt(tx) {
      const user = getSessionUser();
      const currentEmail = (user?.email || "").toLowerCase();

      const statusBanner = document.getElementById("statusBanner");
      const statusPill = document.getElementById("statusPill");
      const actionsDiv = document.querySelector(".actions");
      actionsDiv.innerHTML = ""; // reset actions per selection

      const receiptBtn = document.createElement("button");
      receiptBtn.className = "btn";
      receiptBtn.textContent = "Download Receipt (PDF)";
      receiptBtn.onclick = async () => {
        if (!tx?.id) return;
        try {
          const res = await fetch(apiUrl(`/transactions/${encodeURIComponent(tx.id)}/receipt`), {
            headers: window.getAuthHeaders ? window.getAuthHeaders() : {}
          });
          if (res.status === 401) {
            handleAuthRequired("Session expired. Please log in.");
            return;
          }
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data?.error || `Failed to download receipt (${res.status})`);
          }
          const blob = await res.blob();
          const reference = String(tx.reference || tx.id || "transaction");
          const fileName = `receipt-${reference.replace(/[^a-zA-Z0-9_-]/g, "")}.pdf`;
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        } catch (err) {
          console.error("Receipt download failed", err);
          document.getElementById("txContainer").textContent = err.message || "Could not download receipt.";
        }
      };
      actionsDiv.appendChild(receiptBtn);

      const amt = Number(tx.amount) || 0;
      const feeAmount = Number(tx.fee_amount || 0);

  // Sender/receiver relative to current user (fallback to tx.type when emails are absent)
  const txType = (tx.type || '').toLowerCase();
  const isSender = ((tx.sender_email || '').toLowerCase() === currentEmail) || txType === 'debit';
  const isReceiver = ((tx.recipient_email || '').toLowerCase() === currentEmail) || txType === 'credit';
        const txReference = String(tx.reference || tx.id || '').trim();
        const fallbackReference = tx.id ? `TX-${String(tx.id).slice(0, 8).toUpperCase()}` : `TX-${Date.now()}`;
        const displayReference = txReference || fallbackReference;
        const displayDirection = txType === 'credit' ? 'Incoming' : 'Outgoing';

      const txStatus = String(tx.status || "completed").toLowerCase();
      const statusLabel = txStatus.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());

      if (txStatus === "completed") {
        statusBanner.style.display = "flex";
        statusBanner.className = "banner ok";
        statusBanner.innerHTML = `<div class="icon">✓</div><div>Completed — This transaction has been processed successfully</div>`;
        statusPill.className = "status-pill completed";
        statusPill.textContent = "Completed";
      } else if (txStatus === "processing_fee_required") {
        statusBanner.style.display = "flex";
        statusBanner.className = "banner warn";
        statusBanner.innerHTML = `<div class="icon">⏱</div><div>Pending — Payment of required fee is needed to complete this transaction</div>`;
        statusPill.className = "status-pill pending";
        statusPill.textContent = "Pending (Fee Required)";

        const payBtn = document.createElement("button");
        payBtn.className = "btn btn-primary";
        payBtn.textContent = feeAmount > 0
          ? `Pay Fee ($${feeAmount.toFixed(2)})`
          : "Pay Processing Fee";
        payBtn.onclick = () => {
          localStorage.setItem("pending-fee", JSON.stringify({ amount: feeAmount, originalTx: tx }));
          window.location.href = "pay-fee.html";
        };
        actionsDiv.appendChild(payBtn);
      } else {
        statusBanner.style.display = "flex";
        statusBanner.className = "banner warn";
        statusBanner.innerHTML = `<div class="icon">⏱</div><div>${statusLabel} — This transaction is not completed yet</div>`;
        statusPill.className = "status-pill pending";
        statusPill.textContent = statusLabel;
      }

      // Amount
      document.getElementById("amountValue").textContent = `$${amt.toFixed(2)}`;

      // Names: prefer explicit fields; fall back to user + description parsing; finally use lookup by email.
      const extractAfter = (desc, marker) => {
        if (!desc) return null;
        const d = String(desc);
        const idx = d.toLowerCase().lastIndexOf(marker);
        if (idx === -1) return null;
        return d.slice(idx + marker.length).trim();
      };

      let fromDisplay = (tx.sender_account_name || tx.sender_fullname || tx.sender_name) || null;
      let toDisplay = (tx.recipient_account_name || tx.recipient_fullname || tx.recipient_name) || null;

      // Derive from current user context and description patterns when missing
      const desc = tx.description || '';
      if (!fromDisplay || !toDisplay){
        if (txType === 'debit') {
          fromDisplay = fromDisplay || user.accountname || user.fullname || fromDisplay;
          toDisplay = toDisplay || extractAfter(desc, ' to ');
        } else if (txType === 'credit') {
          toDisplay = toDisplay || user.accountname || user.fullname || toDisplay;
          fromDisplay = fromDisplay || extractAfter(desc, ' from ');
        }
      }

      // As a last resort, try to resolve by email lookup (if emails exist and still missing)
      if ((!fromDisplay && tx.sender_email) || (!toDisplay && tx.recipient_email)){
        try{
          const [fromName, toName] = await Promise.all([
            fromDisplay ? Promise.resolve(null) : lookupName(tx.sender_email, user.token),
            toDisplay ? Promise.resolve(null) : lookupName(tx.recipient_email, user.token)
          ]);
          fromDisplay = fromDisplay || fromName;
          toDisplay = toDisplay || toName;
        } catch {}
      }

      // Final fallbacks
      fromDisplay = fromDisplay || '—';
      toDisplay = toDisplay || '—';

      if (isSender && fromDisplay === '—') fromDisplay = user?.accountname || user?.fullname || 'You';
      if (isReceiver && toDisplay === '—') toDisplay = user?.accountname || user?.fullname || 'You';

      document.getElementById("summaryText").textContent = `${displayDirection} • Ref ${displayReference}`;
      document.getElementById("fromValue").textContent = fromDisplay;
      document.getElementById("toValue").textContent = toDisplay;

      // Description
      document.getElementById("descriptionValue").textContent = tx.description || statusLabel;

      // Details
      document.getElementById("referenceValue").textContent = displayReference;
      const txMethod = String(tx.method || '').toUpperCase();
      const networkText = txMethod
        ? `Base ${txMethod}`
        : (tx.btc_address ? "Bitcoin Network" : "Base Internal");
      document.getElementById("networkValue").textContent = networkText;

      let feeText = "No fee";
      if (txStatus === "processing_fee_required") {
        feeText = feeAmount > 0 ? `$${feeAmount.toFixed(2)} required` : "Required";
      } else if (feeAmount > 0) {
        feeText = `$${feeAmount.toFixed(2)}`;
      }
      document.getElementById("feesValue").textContent = feeText;

      // Extra fields
      const extras = [];
      if (tx.created_at) extras.push(`<strong>Date:</strong> ${new Date(tx.created_at).toLocaleString()}`);
      extras.push(`<strong>Direction:</strong> ${displayDirection}`);
      extras.push(`<strong>Status:</strong> ${statusLabel}`);
      if (tx.account_number) extras.push(`<strong>Account #:</strong> ${tx.account_number}`);
      if (tx.routing_number) extras.push(`<strong>Routing #:</strong> ${tx.routing_number}`);
      if (tx.btc_address) extras.push(`<strong>BTC Address:</strong> ${tx.btc_address}`);
      document.getElementById("extraDetails").innerHTML = extras.join("<br>");
    }
  </script>
</body>
</html>
