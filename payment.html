<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payments · Home</title>
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="ui.css" />
  <link rel="icon" href="assets/favicon-base-credit.svg" type="image/svg+xml" />
  <style>
    .layout { display:grid; gap:1rem; grid-template-columns: 1.15fr .85fr; }
    .status-bar { margin-bottom:.6rem; font-size:.72rem; }
    .tabs { margin-bottom:1rem; }
    .muted { font-size:.75rem; }
    .error { font-size:.78rem; min-height:1.1rem; }

    .list { max-height:520px; overflow:auto; }
    .item { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px; cursor:pointer; }
    .item:last-child { border-bottom:none; }
    .item:hover { background:var(--color-surface-muted); }
    .item.active { background:color-mix(in srgb, var(--color-accent-soft) 60%, var(--color-surface-strong)); box-shadow: inset 3px 0 0 var(--color-accent); }
    .item-left { display:flex; align-items:center; gap:10px; }
    .item-icon { width:36px; height:36px; display:grid; place-items:center; border-radius:50%; background:var(--color-accent-soft); color:color-mix(in srgb, var(--color-accent) 72%, white 12%); font-weight:900; }
    .item-title { font-weight:800; }
    .item-meta { font-size:.8rem; color:var(--color-text-muted); }
    .amt { font-weight:900; }
    .amt.neg { color:var(--color-danger); }

    /* Success Modal */
    .modal h3 { margin:0 0 .35rem; font-size:1rem; }
    .modal .actions { justify-content:flex-end; }

    @media (max-width:880px){ main.layout { grid-template-columns: 1fr; } }
    @media (max-width:520px){
      .row { grid-template-columns: 1fr; }
      .btn { flex:1; justify-content:center; }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1 class="page-title">Payments</h1>
    <nav class="page-header-nav"><button type="button" class="btn btn-outline theme-toggle" data-action="theme-toggle"><span aria-hidden="true">◐</span><span class="theme-toggle-label">Theme</span></button><a class="back-link" href="dashboard.html">← Back to Home</a></nav>
  </header>

  <main class="layout layout-wide layout-split">
    <!-- Left: New Payment -->
    <section class="panel">
      <h2>New Payment</h2>

      <div class="status-bar">
        <span class="pill" id="userPill">Loading…</span>
        <span class="pill" id="balPill">Available — …</span>
      </div>

      <div class="tabs" role="tablist" aria-label="Payment method">
        <button class="tab active" data-method="billpay" aria-selected="true">Bill Pay</button>
        <button class="tab" data-method="ach">ACH</button>
        <button class="tab" data-method="wire">Wire</button>
      </div>

      <form id="payForm" novalidate>
        <div class="row">
          <div class="field">
            <label for="fromAccount">From account</label>
            <select id="fromAccount" name="from_account_type">
              <option value="available">Available Balance</option>
            </select>
          </div>
          <div class="field">
            <label for="scheduleDate">Schedule date</label>
            <input id="scheduleDate" name="schedule_date" type="date" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="payeeName">Payee name</label>
            <input id="payeeName" name="payee_name" type="text" placeholder="Company or person" required />
          </div>
          <div class="field">
            <label for="payeeEmail">Payee email (optional)</label>
            <input id="payeeEmail" name="payee_email" type="email" placeholder="payee@example.com" />
          </div>
        </div>

        <!-- Bank details (for ACH/Wire) -->
        <div id="bankDetails" class="row" style="display:none;">
          <div class="field">
            <label for="bankName">Bank name</label>
            <input id="bankName" name="bank_name" type="text" placeholder="Bank" />
          </div>
          <div class="field">
            <label for="routingNumber">Routing number</label>
            <input id="routingNumber" name="routing_number" type="text" placeholder="Routing" />
          </div>
          <div class="field">
            <label for="accountNumber">Account number</label>
            <input id="accountNumber" name="account_number" type="text" placeholder="Account" />
          </div>
          <div class="field">
            <label for="refNumber">Reference (optional)</label>
            <input id="refNumber" name="reference" type="text" placeholder="Invoice #" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="amount">Amount</label>
            <input id="amount" name="amount" type="number" min="1" step="0.01" placeholder="0.00" required />
          </div>
          <div class="field">
            <label for="note">Description (optional)</label>
            <input id="note" name="description" type="text" placeholder="Add a note" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>&nbsp;</label>
            <div class="summary">
              <div class="rowline"><span>Method</span><strong id="sumMethod">Bill Pay</strong></div>
              <div class="rowline"><span>Total</span><strong id="sumTotal">$0.00</strong></div>
            </div>
          </div>
        </div>

        <div id="formError" class="error"></div>
        <div class="actions">
          <button type="submit" class="btn btn-primary">Submit Payment</button>
          <button type="button" class="btn" id="cancelBtn">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Right: Recent Payments -->
    <aside class="panel">
      <h2>Recent Payments</h2>
      <div id="payList" class="list"></div>
      <div id="payEmpty" class="muted" style="display:none; padding:.6rem 0;">No payments found.</div>
      <div style="margin-top:1rem;">
        <div class="summary" id="payDetails" style="display:none;">
          <div class="rowline"><span>Payee</span><strong id="dPayee">—</strong></div>
          <div class="rowline"><span>Amount</span><strong id="dAmount">—</strong></div>
          <div class="rowline"><span>Method</span><strong id="dMethod">—</strong></div>
          <div class="rowline"><span>Status</span><strong id="dStatus">—</strong></div>
          <div class="rowline"><span>Reference</span><strong id="dRef">—</strong></div>
          <div class="rowline"><span>Scheduled</span><strong id="dDate">—</strong></div>
        </div>
      </div>
    </aside>
  </main>

  <!-- Success Modal -->
  <div id="successModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="successTitle">
    <div class="card">
      <div class="ok">✅ <strong id="successTitle">Payment Scheduled</strong></div>
      <div class="kvs" id="successDetails"></div>
      <div class="actions">
        <button class="btn" id="closeModalBtn">Close</button>
        <button class="btn btn-primary" id="viewTxBtn">View Transactions</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="common.js"></script>
  <script>
    let user = null;
    let userStream = null;
    let currentMethod = 'billpay';
    let paymentsEnabled = true;
    const SSE_RECONNECT_MS = 2000;
    const qs = (s)=>document.querySelector(s);
    const qsa = (s)=>Array.from(document.querySelectorAll(s));

    function fmtAmt(n){ return isFinite(n) ? Number(n).toLocaleString(undefined,{style:'currency',currency:'USD'}) : '$0.00'; }
    function setText(id, v){ const el=document.getElementById(id); if(el) el.textContent=v; }

    function apiUrl(path=''){
      const normalizedPath = `/${String(path || '').replace(/^\/+/, '')}`;
      if (/^\/api(\/|$)/i.test(normalizedPath)) return normalizedPath;
      return `${window.API_BASE}${normalizedPath}`;
    }

    function handleAuthRequired(message){
      const outcome = window.BSSession?.onAuthRequired
        ? window.BSSession.onAuthRequired({ message })
        : { redirected: true };
      if (!outcome.redirected) {
        const err = document.getElementById('formError');
        if (err) err.textContent = outcome.message || message;
        setText('userPill', 'Session required');
      }
      return outcome;
    }

    function loadStoredUser(){
      if (window.BSSession?.getUser) user = window.BSSession.getUser();
      else {
        try { user = JSON.parse(localStorage.getItem('bs-user')||'null'); } catch { user = null; }
      }
      if(!user || !user.token){
        handleAuthRequired('Session expired. Please log in.');
        return false;
      }
      setText('userPill', user.fullname || user.accountname || '—');
      updateBalancePill(user);
      // default schedule date = today
      try { qs('#scheduleDate').value = new Date().toISOString().slice(0,10); } catch {}
      return true;
    }
    function updateBalancePill(p){
      const avail = Number(p.available_balance ?? p.balances?.available ?? p.balances?.total ?? 0);
      setText('balPill', 'Available — ' + fmtAmt(avail));
    }
    function authHeaders(){
      let headers = {};
      if (window.getAuthHeaders) {
        headers = window.getAuthHeaders();
      } else {
        try {
          const storedUser = JSON.parse(localStorage.getItem('bs-user') || 'null');
          const token = storedUser?.token || localStorage.getItem('bs-token') || '';
          headers = token ? { Authorization: `Bearer ${token}` } : {};
        } catch {
          const token = localStorage.getItem('bs-token') || '';
          headers = token ? { Authorization: `Bearer ${token}` } : {};
        }
      }
      return { 'Content-Type':'application/json', ...headers };
    }

    function setPaymentsAvailability(enabled, reason = '') {
      paymentsEnabled = Boolean(enabled);
      const message = reason || 'Payments are currently disabled by admin.';

      qsa('#payForm input, #payForm select, #payForm textarea, #payForm button, .tabs .tab').forEach((el) => {
        el.disabled = !paymentsEnabled;
      });

      if (!paymentsEnabled) {
        qs('#formError').textContent = message;
      } else if (qs('#formError').textContent === message) {
        qs('#formError').textContent = '';
      }
    }

    async function loadSettings(){
      try {
        const data = await fetchJSON('/api/settings');
        setPaymentsAvailability(data?.paymentsEnabled !== false);
      } catch {
        setPaymentsAvailability(true);
      }
    }

    async function fetchJSON(url, opts={}){
      const isAbsolute = /^https?:\/\//i.test(String(url || ''));
      const target = isAbsolute ? url : apiUrl(url);
      const res = await fetch(target, opts);
      const txt = await res.text();
      const data = txt ? JSON.parse(txt) : null;
      if (res.status === 401) {
        handleAuthRequired(data?.error || 'Session expired. Please log in.');
      }
      if(!res.ok) throw new Error(data?.error || ('HTTP '+res.status));
      return data;
    }

    function selectMethod(m){
      currentMethod = m;
      qsa('.tab').forEach(t => t.classList.toggle('active', t.dataset.method === m));
      setText('sumMethod', m.toUpperCase());
      // Toggle bank detail block
      const bank = qs('#bankDetails');
      bank.style.display = (m === 'ach' || m === 'wire') ? 'grid' : 'none';
    }

    async function handleSubmit(e){
      e.preventDefault();
      qs('#formError').textContent = '';

      if (!paymentsEnabled) {
        qs('#formError').textContent = 'Payments are currently disabled by admin.';
        return;
      }

      const fd = new FormData(qs('#payForm'));
      const payload = {
        method: currentMethod, // 'billpay' | 'ach' | 'wire'
        from_account_type: fd.get('from_account_type') || 'available',
        schedule_date: fd.get('schedule_date') || null,
        payee_name: (fd.get('payee_name')||'').trim(),
        payee_email: (fd.get('payee_email')||'').trim() || null,
        amount: parseFloat(fd.get('amount')||'0'),
        description: (fd.get('description')||'').trim() || null,
        bank_name: fd.get('bank_name') || null,
        routing_number: fd.get('routing_number') || null,
        account_number: fd.get('account_number') || null,
        reference: (fd.get('reference')||'').trim() || null
      };

      if(!payload.payee_name || !payload.amount || payload.amount <= 0){
        qs('#formError').textContent = 'Enter payee name and a valid amount.';
        return;
      }
      if((currentMethod === 'ach' || currentMethod === 'wire') &&
         (!payload.bank_name || !payload.routing_number || !payload.account_number)){
        qs('#formError').textContent = 'Bank name, routing, and account number are required for ACH/Wire.';
        return;
      }

      try{
        const data = await fetchJSON('/api/payments', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(payload)
        });

        if (typeof data?.available_balance !== 'undefined') {
          user = { ...(user || {}), available_balance: Number(data.available_balance) };
          try { localStorage.setItem('bs-user', JSON.stringify(user)); } catch {}
          updateBalancePill(user);
        }

        const payment = data?.payment || {};
        const details = document.getElementById('successDetails');
        details.innerHTML = `
          <div class="kv"><span>Payee</span><strong>${payment.payee_name || payload.payee_name}</strong></div>
          <div class="kv"><span>Amount</span><strong>${fmtAmt(payment.amount || payload.amount)}</strong></div>
          <div class="kv"><span>Method</span><strong>${String(payment.method || payload.method || '').toUpperCase()}</strong></div>
          <div class="kv"><span>Reference</span><strong>${payment.reference || '—'}</strong></div>
          <div class="kv"><span>Status</span><strong>${String(payment.status || 'scheduled').toUpperCase()}</strong></div>
        `;

        qs('#successModal').style.display = 'flex';
        qs('#payForm').reset();
        try { qs('#scheduleDate').value = new Date().toISOString().slice(0,10); } catch {}
        updateSummary(0);
        await loadPayments();
      } catch(err){
        qs('#formError').textContent = err.message || 'Payment failed';
      }
    }

    function updateSummary(val){ setText('sumTotal', fmtAmt(val)); }

    async function loadPayments(){
      const list = document.getElementById('payList');
      const empty = document.getElementById('payEmpty');
      list.innerHTML = '';

      try {
        const rows = await fetchJSON('/api/payments', { headers: authHeaders() });
        if (!Array.isArray(rows) || !rows.length) {
          empty.style.display='block';
          empty.textContent = 'No payments found.';
          return;
        }

        empty.style.display='none';
        rows.forEach((payment, idx) => {
          const item = document.createElement('div');
          item.className = `item${idx === 0 ? ' active' : ''}`;
          item.innerHTML = `
            <div class="item-left">
              <div class="item-icon">$</div>
              <div>
                <div class="item-title">${payment.payee_name || 'Payee'}</div>
                <div class="item-meta">${String(payment.method || '').toUpperCase()} • ${new Date(payment.created_at).toLocaleDateString()}</div>
              </div>
            </div>
            <div class="amt neg">-${fmtAmt(payment.amount || 0)}</div>
          `;

          item.addEventListener('click', () => {
            list.querySelectorAll('.item').forEach((el) => el.classList.remove('active'));
            item.classList.add('active');
            renderPaymentDetails(payment);
          });

          list.appendChild(item);
        });

        renderPaymentDetails(rows[0]);
      } catch (err) {
        empty.style.display='block';
        empty.textContent = err.message || 'Could not load payments.';
      }
    }

    function renderPaymentDetails(p){
      const box = qs('#payDetails');
      box.style.display = 'grid';
      setText('dPayee', p.payee_name || '—');
      setText('dAmount', fmtAmt(p.amount||0));
      setText('dMethod', (p.method||'').toString().toUpperCase() || '—');
      setText('dStatus', (p.status||'scheduled').toString().toUpperCase());
      setText('dRef', p.reference || p.id || '—');
      setText('dDate', p.schedule_date || (p.created_at ? new Date(p.created_at).toLocaleDateString() : '—'));
    }

    function updateDashboard(data){
      if (!data || data.connected) return;
      user = { ...(user || {}), ...data };
      try { localStorage.setItem('bs-user', JSON.stringify(user)); } catch {}
      updateBalancePill(user);
      setText('userPill', user.fullname || user.accountname || '—');
    }

    function bindUI(){
      qsa('.tab').forEach(btn => btn.addEventListener('click', ()=> selectMethod(btn.dataset.method)));
      qs('#payForm').addEventListener('submit', handleSubmit);
      qs('#cancelBtn').addEventListener('click', ()=> location.href='dashboard.html');
      qs('#amount').addEventListener('input', (e)=> updateSummary(parseFloat(e.target.value||'0')));
      document.getElementById('closeModalBtn').addEventListener('click', ()=> qs('#successModal').style.display='none');
      document.getElementById('viewTxBtn').addEventListener('click', ()=> location.href='transactions.html');
    }

    function startUserStream(currentUser){
      if(!currentUser?.id || !currentUser?.token) return;

      if(userStream){
        userStream.close();
        userStream = null;
      }

      const resolvedUserId = window.resolveUserId?.(currentUser.id || currentUser.sub) || (currentUser.id || currentUser.sub || "");
      const streamURL = `${window.API_BASE}/stream/user/${encodeURIComponent(resolvedUserId)}?token=${encodeURIComponent(currentUser.token)}`;
      const stream = new EventSource(streamURL);
      userStream = stream;

      stream.onmessage = (event)=>{
        try {
          const data = JSON.parse(event.data);
          updateDashboard(data);
        } catch {}
      };

      stream.onerror = ()=>{
        console.warn('Stream lost. Reconnecting...');
        stream.close();
        if (user?.id && user?.token) {
          setTimeout(()=> startUserStream(user), SSE_RECONNECT_MS);
        }
      };
    }

    (function init(){
      if (window.Notifications) window.Notifications.init();
      if (!loadStoredUser()) return;
      loadSettings();
      bindUI();
      selectMethod('billpay');
      startUserStream(user);
      loadPayments();
    })();
  </script>
</body>
</html>
